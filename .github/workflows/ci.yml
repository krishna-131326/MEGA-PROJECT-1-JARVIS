name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y portaudio19-dev python3-dev
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install bandit pip-audit pre-commit
        
    - name: Format & Lint (Ruff)
      run: |
        ruff check .
        ruff format --check .
        
    - name: Type checking (Mypy)
      run: |
        mypy src/jarvis
        
    - name: Security scan (Bandit & pip-audit)
      run: |
        bandit -r src/
        pip-audit
        
    - name: Test (Pytest)
      run: |
        pytest tests/ -v
